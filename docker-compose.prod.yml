version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: oracleflow-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oracleflow-app
    env_file: .env
    expose:
      - "5001"
      - "3000"
    depends_on:
      neo4j:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  neo4j:
    image: neo4j:5.18-community
    container_name: oracleflow-neo4j
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-oracleflow}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=2g
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: oracleflow-postgres
    environment:
      POSTGRES_DB: oracleflow
      POSTGRES_USER: oracleflow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oracleflow}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oracleflow"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: oracleflow-redis
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  neo4j_data:
  postgres_data:
  redis_data:
